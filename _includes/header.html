<!-- Header & Navigation -->
<header>
  <div class="container">
    <nav>
      <a href="{{ '/' | relative_url }}" aria-label="Trailfront Home" class="logo-link">
        <picture class="logo-picture">
          <source srcset="{{ '/assets/trailfront/wordmark-github-dark.svg' | relative_url }}" media="(prefers-color-scheme: dark)">
          <img src="{{ '/assets/trailfront/wordmark-github-light.svg' | relative_url }}" alt="Trailfront" class="logo" width="1200" height="240">
        </picture>
      </a>
      
      <ul class="nav-menu">
        <li><a href="{{ '/' | relative_url }}#about" class="nav-link">About</a></li>
        <li><a href="{{ '/' | relative_url }}#projects" class="nav-link">Projects</a></li>
        <li><a href="{{ '/' | relative_url }}#offerings" class="nav-link">Offerings</a></li>
        <li><a href="{{ '/' | relative_url }}#skills" class="nav-link">Skills</a></li>
        <li><a href="{{ '/' | relative_url }}#contact" class="nav-link">Contact</a></li>
        <li><a href="{{ '/bookshelf/' | relative_url }}" class="nav-link"{% if page.url contains '/bookshelf' %} aria-current="page"{% endif %}>Bookshelf</a></li>
        <li><a href="{{ '/blog/' | relative_url }}" class="nav-link"{% if page.url contains '/blog' %} aria-current="page"{% endif %}>Blog</a></li>
        <li><a href="{{ '/web-tools/' | relative_url }}" class="nav-link"{% if page.url contains '/web-tools' %} aria-current="page"{% endif %}>Web Tools</a></li>
      </ul>
    </nav>
  </div>
</header>
